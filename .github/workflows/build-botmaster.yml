# Compile BotMaster.exe + BotMasterUpdater.exe et publie une GitHub Release.
# Le manifest update-manifest.json contient build_id (run_id + SHA) pour détecter les nouveaux builds.
name: Build BotMaster

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "BotMaster.py"
      - "BotMasterUpdater.py"
      - "images/master.ico"
      - ".github/workflows/build-botmaster.yml"

# Évite d’empiler plusieurs builds si tu pousses plusieurs commits à la suite.
concurrency:
  group: build-botmaster-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip : la clé inclut le hash de CE fichier. Modifier la ligne pip ci‑dessous invalide le cache (normal).
          cache: pip
          cache-dependency-path: .github/workflows/build-botmaster.yml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install pyinstaller "flask>=3.0" "PySide6>=6.6" pywin32 psutil "playwright>=1.40"

      - name: Write build_id.txt
        shell: pwsh
        run: |
          $id = "${{ github.run_id }}-${{ github.sha }}"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$pwd/build_id.txt", $id.Trim(), $utf8NoBom)

      - name: Build BotMaster.exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --icon "images/master.ico"
          --uac-admin
          --add-data "build_id.txt;."
          --name BotMaster
          "BotMaster.py"

      - name: Build BotMasterUpdater.exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name BotMasterUpdater
          "BotMasterUpdater.py"

      - name: Write update-manifest.json
        shell: pwsh
        run: |
          $bid = (Get-Content -Path "build_id.txt" -Raw).Trim()
          $repo = "${{ github.repository }}"
          $downloadUrl = "https://github.com/$repo/releases/latest/download/BotMaster.exe"
          $obj = [ordered]@{ build_id = $bid; download_url = $downloadUrl }
          $json = $obj | ConvertTo-Json -Compress
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$pwd/update-manifest.json", $json, $utf8NoBom)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Build ${{ github.run_id }}"
          body: |
            Build déclenché par le push sur `${{ github.ref_name }}`.
            - Identifiant de build : `${{ github.run_id }}-${{ github.sha }}` (voir `update-manifest.json`, champ `build_id`).
            - Téléchargement direct : [BotMaster.exe](https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_id }}/BotMaster.exe)
          files: |
            dist/BotMaster.exe
            dist/BotMasterUpdater.exe
            update-manifest.json
          fail_on_unmatched_files: true
          make_latest: true
